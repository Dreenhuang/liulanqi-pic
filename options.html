<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>浏览器看图片 - 设置</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }
    
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }
    
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px;
      text-align: center;
    }
    
    .header h1 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 10px;
    }
    
    .header p {
      opacity: 0.9;
      font-size: 14px;
    }
    
    .content {
      padding: 40px 30px;
    }
    
    .section {
      margin-bottom: 35px;
    }
    
    .section-title {
      font-size: 18px;
      font-weight: 600;
      color: #333;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid #667eea;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .section-title::before {
      content: '';
      width: 4px;
      height: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 2px;
    }
    
    .form-group {
      margin-bottom: 25px;
    }
    
    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #555;
      margin-bottom: 10px;
    }
    
    .form-group .hint {
      font-size: 12px;
      color: #999;
      margin-top: 6px;
    }
    
    .input-group {
      display: flex;
      gap: 15px;
      align-items: center;
    }
    
    .input-wrapper {
      flex: 1;
    }
    
    .input-wrapper label {
      font-size: 12px;
      color: #777;
      margin-bottom: 6px;
    }
    
    input[type="number"],
    input[type="text"] {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 15px;
      transition: all 0.3s ease;
      background: #fafafa;
    }
    
    input[type="number"]:focus,
    input[type="text"]:focus {
      outline: none;
      border-color: #667eea;
      background: white;
      box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
    }
    
    .unit {
      color: #999;
      font-size: 14px;
      white-space: nowrap;
    }
    
    .path-input {
      display: flex;
      gap: 10px;
    }
    
    .path-input input {
      flex: 1;
    }
    
    .btn-reset {
      padding: 12px 20px;
      background: #f0f0f0;
      border: none;
      border-radius: 10px;
      color: #666;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
      white-space: nowrap;
    }
    
    .btn-reset:hover {
      background: #e0e0e0;
    }
    
    .actions {
      display: flex;
      gap: 15px;
      margin-top: 40px;
      padding-top: 30px;
      border-top: 1px solid #eee;
    }
    
    .btn {
      flex: 1;
      padding: 15px 30px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
    }
    
    .btn-secondary {
      background: #f0f0f0;
      color: #666;
    }
    
    .btn-secondary:hover {
      background: #e0e0e0;
    }
    
    .status {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 15px 25px;
      background: #4ade80;
      color: white;
      border-radius: 10px;
      font-weight: 500;
      box-shadow: 0 10px 30px rgba(74, 222, 128, 0.3);
      transform: translateX(150%);
      transition: transform 0.3s ease;
    }
    
    .status.show {
      transform: translateX(0);
    }
    
    .status.error {
      background: #f87171;
      box-shadow: 0 10px 30px rgba(248, 113, 113, 0.3);
    }
    
    .preview-box {
      background: #f8f9fa;
      border-radius: 10px;
      padding: 20px;
      margin-top: 15px;
    }
    
    .preview-title {
      font-size: 12px;
      color: #999;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .preview-content {
      font-size: 14px;
      color: #333;
      line-height: 1.6;
    }
    
    .preview-content span {
      color: #667eea;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>⚙️ 浏览器看图片</h1>
      <p>自定义您的图片浏览体验</p>
    </div>
    
    <div class="content">
      <div class="section">
        <div class="section-title">图片过滤设置</div>
        
        <div class="form-group">
          <label>最小图片尺寸（像素）</label>
          <div class="input-group">
            <div class="input-wrapper">
              <label>宽度</label>
              <input type="number" id="minWidth" min="100" max="2000" value="600">
            </div>
            <span class="unit">×</span>
            <div class="input-wrapper">
              <label>高度</label>
              <input type="number" id="minHeight" min="100" max="2000" value="600">
            </div>
            <span class="unit">像素</span>
          </div>
          <div class="hint">只有宽度和高度都大于此值的图片才会被显示</div>
        </div>
        
        <div class="preview-box">
          <div class="preview-title">当前设置</div>
          <div class="preview-content">
            将显示尺寸大于 <span id="previewSize">600 × 600</span> 像素的图片
          </div>
        </div>
      </div>
      
      <div class="section">
        <div class="section-title">下载设置</div>
        
        <div class="form-group">
          <label>默认下载路径</label>
          <div class="path-input">
            <input type="text" id="downloadPath" value="D:\\PIC" placeholder="例如: D:\\Pictures">
            <button class="btn-reset" id="resetPath">恢复默认</button>
          </div>
          <div class="hint">一键下载时，图片将保存到此文件夹（注意：浏览器限制，实际下载路径以浏览器设置为准）</div>
        </div>
      </div>
      
      <div class="actions">
        <button class="btn btn-secondary" id="cancelBtn">取消</button>
        <button class="btn btn-primary" id="saveBtn">保存设置</button>
      </div>
    </div>
  </div>
  
  <div class="status" id="status">设置已保存</div>
  
  <script src="options.js"></script>
</body>
</html>
